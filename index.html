<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 深圳KPOP路演组队 - 预览 v3.0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0a0a14;
    background-image: radial-gradient(circle at 20% 10%, rgba(192,132,252,0.12), transparent 40%),
                      radial-gradient(circle at 80% 90%, rgba(244,114,182,0.1), transparent 40%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 12px 60px;
    color: #f0e6ff;
  }
  .page-head { text-align: center; margin-bottom: 20px; }
  .page-head h1 { font-size: 22px; color: #f0e6ff; margin-bottom: 6px; }
  .page-head p { font-size: 13px; color: #a094b8; }
  .phones { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }

  /* 手机框 */
  .phone {
    width: 340px;
    max-width: 92vw;
    height: 720px;
    background: #0d0d1a;
    border-radius: 40px;
    border: 10px solid #1a1a26;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 2px rgba(192,132,252,0.15);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .phone-label {
    text-align: center;
    font-size: 12px;
    color: #a094b8;
    margin-top: 10px;
    font-weight: 600;
  }
  .phone-col { display: flex; flex-direction: column; align-items: center; }

  /* 导航栏 */
  .navbar {
    background: #1a0a2e;
    color: #f0e6ff;
    text-align: center;
    padding: 12px 0 10px;
    font-size: 15px;
    font-weight: 600;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 1px solid rgba(192,132,252,0.12);
  }
  .navbar .back {
    position: absolute; left: 14px; font-size: 20px; color: #c084fc; cursor: pointer;
  }

  /* 内容滚动区 */
  .screen {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 70px;
    position: relative;
  }
  .screen::-webkit-scrollbar { width: 0; }

  /* 底部 tabbar */
  .tabbar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 58px;
    background: #1a0a2e;
    border-top: 1px solid rgba(192,132,252,0.12);
    display: flex;
  }
  .tabbar .tab {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; color: #8888aa; gap: 3px; cursor: pointer;
  }
  .tabbar .tab.active { color: #c084fc; }
  .tabbar .tab .ico { font-size: 20px; }

  /* ── 通用组件 ── */
  .hero {
    background: linear-gradient(135deg, #1a0a2e 0%, #2d1050 50%, #1a0a2e 100%);
    padding: 18px 16px;
    margin: 12px;
    border-radius: 16px;
    border: 1px solid rgba(192,132,252,0.2);
  }
  .hero h2 { font-size: 18px; color: #f0e6ff; margin-bottom: 4px; }
  .hero p { font-size: 12px; color: #a094b8; }
  .hero .stat { margin-top: 12px; }
  .hero .stat b { font-size: 22px; color: #c084fc; }
  .hero .stat span { font-size: 11px; color: #a094b8; margin-left: 4px; }

  .search-bar { padding: 0 12px; margin-bottom: 10px; }
  .search-wrap {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(192,132,252,0.15);
    border-radius: 30px; padding: 9px 16px;
  }
  .search-wrap input {
    flex: 1; border: none; background: transparent; color: #f0e6ff;
    font-size: 14px; outline: none;
  }
  .search-wrap input::placeholder { color: #6b5e80; }
  .search-wrap .clr { color: #6b5e80; cursor: pointer; padding-left: 6px; }

  .filter-block { padding: 0 12px; margin-bottom: 10px; }
  .type-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .type-tag {
    flex: 1; text-align: center; padding: 9px 0; border-radius: 12px;
    font-size: 13px; color: #a094b8;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(192,132,252,0.1);
    cursor: pointer; transition: all 0.15s;
  }
  .type-tag.active {
    background: linear-gradient(135deg, rgba(192,132,252,0.35), rgba(244,114,182,0.35));
    color: #f0e6ff; border-color: rgba(192,132,252,0.5); font-weight: 600;
  }
  .combo-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .combo-row::-webkit-scrollbar { display: none; }
  .combo-tag {
    flex-shrink: 0; padding: 6px 14px; border-radius: 30px; font-size: 12px;
    color: #a094b8; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(192,132,252,0.1); cursor: pointer; white-space: nowrap;
  }
  .combo-tag.active {
    background: linear-gradient(135deg, rgba(192,132,252,0.3), rgba(244,114,182,0.3));
    color: #f0e6ff; border-color: rgba(192,132,252,0.4);
  }

  /* 组队卡片 */
  .team-list { padding: 0 12px; }
  .card {
    background: linear-gradient(135deg, #1a0a2e, #1f1040);
    border: 1px solid rgba(192,132,252,0.12);
    border-radius: 14px; padding: 15px; margin-bottom: 12px;
    position: relative; cursor: pointer; transition: all 0.15s;
  }
  .card:active { transform: scale(0.99); }
  .card .status {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; padding: 3px 10px; border-radius: 30px;
    background: rgba(244,114,182,0.15); color: #f472b6;
  }
  .card .status.done { background: rgba(52,211,153,0.15); color:#34d399; }
  .card .song { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; padding-right: 70px; }
  .combo-badge { font-size: 11px; padding: 3px 12px; border-radius: 30px; background: rgba(244,114,182,0.15); color: #f472b6; font-weight: 600; }
  .card .song .name { font-size: 17px; font-weight: 700; color: #f0e6ff; }
  .card .pos { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .pos-tag { padding: 4px 12px; border-radius: 30px; font-size: 11px; background: rgba(192,132,252,0.12); color: #c084fc; border: 1px solid rgba(192,132,252,0.2); }
  .card .info { margin-bottom: 10px; }
  .card .info .row { font-size: 12px; color: #a094b8; margin-bottom: 4px; display: flex; gap: 6px; }
  .card .foot { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid rgba(192,132,252,0.08); }
  .foot .left { display: flex; align-items: center; gap: 8px; }
  .avatars { display: flex; }
  .avatars .av { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,#c084fc,#f472b6); display: flex; align-items:center; justify-content:center; font-size:12px; color:#fff; border:2px solid #1a0a2e; }
  .avatars .av:not(:first-child) { margin-left: -9px; }
  .foot .cnt { font-size: 12px; color: #a094b8; }
  .audit-badge { font-size: 10px; padding: 3px 10px; border-radius: 30px; }
  .a-none { background: rgba(52,211,153,0.15); color:#34d399; }
  .a-light { background: rgba(96,165,250,0.15); color:#60a5fa; }
  .a-medium { background: rgba(250,204,21,0.15); color:#facc15; }
  .a-medium_strict { background: rgba(251,146,60,0.15); color:#fb923c; }
  .a-strict { background: rgba(248,113,113,0.15); color:#f87171; }
  .joined-flag { position:absolute; top:14px; left:14px; font-size:10px; padding:3px 10px; border-radius:30px; background:rgba(52,211,153,0.15); color:#34d399; }

  .fab {
    position: absolute; bottom: 74px; right: 16px;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg,#c084fc,#f472b6);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; color: white; box-shadow: 0 6px 20px rgba(192,132,252,0.4);
    cursor: pointer; z-index: 20;
  }

  /* 表单 */
  .form { padding: 14px; }
  .fcard { background: linear-gradient(135deg,#1a0a2e,#1f1040); border:1px solid rgba(192,132,252,0.12); border-radius:16px; padding:18px 16px; }
  .fcard h3 { font-size: 18px; color: #f0e6ff; margin-bottom: 4px; }
  .fcard .sub { font-size: 12px; color: #a094b8; margin-bottom: 18px; }
  .fg { margin-bottom: 16px; }
  .fg label { font-size: 13px; color: #c084fc; font-weight: 600; display: block; margin-bottom: 8px; }
  .fg .req { color: #f87171; }
  .fg input, .fg textarea {
    width: 100%; background: rgba(255,255,255,0.04); border:1px solid rgba(192,132,252,0.15);
    border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #f0e6ff; outline: none;
    font-family: inherit;
  }
  .fg input::placeholder, .fg textarea::placeholder { color: #6b5e80; }
  .fg textarea { min-height: 60px; resize: none; }
  .opt-row { display: flex; gap: 8px; }
  .opt {
    flex: 1; text-align: center; padding: 11px 4px; border-radius: 11px; font-size: 12px;
    color: #a094b8; background: rgba(255,255,255,0.04); border: 1px solid rgba(192,132,252,0.1); cursor: pointer;
  }
  .opt.active { background: linear-gradient(135deg, rgba(192,132,252,0.3), rgba(244,114,182,0.3)); color:#f0e6ff; border-color: rgba(192,132,252,0.45); font-weight:600; }
  .hot-combos { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
  .hot-combo { padding: 6px 14px; border-radius: 30px; font-size: 12px; color:#a094b8; background: rgba(255,255,255,0.04); border:1px solid rgba(192,132,252,0.1); cursor:pointer; }
  .hot-combo.active { background: rgba(244,114,182,0.2); color:#f9c0e0; border-color: rgba(244,114,182,0.4); }
  .pos-input-wrap { display: flex; gap: 8px; }
  .pos-input-wrap input { flex: 1; }
  .add-btn { background: rgba(192,132,252,0.15); color:#c084fc; padding: 0 18px; border-radius:10px; font-size:13px; font-weight:600; display:flex; align-items:center; cursor:pointer; }
  .chip-row { display:flex; flex-wrap:wrap; gap:7px; margin-top: 10px; }
  .chip { display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:30px; font-size:12px; background:rgba(192,132,252,0.15); color:#e0b0ff; }
  .chip .x { color:#f87171; cursor:pointer; }
  .stepper { display:flex; align-items:center; gap:16px; }
  .step-btn { width:36px; height:36px; border-radius:50%; background:rgba(192,132,252,0.12); color:#c084fc; font-size:22px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .step-val { font-size:20px; font-weight:700; min-width:40px; text-align:center; }
  .audit-opts { display: flex; flex-wrap: wrap; gap: 7px; }
  .audit-opt { padding: 8px 14px; border-radius:10px; font-size:12px; color:#a094b8; background:rgba(255,255,255,0.04); border:1px solid rgba(192,132,252,0.12); cursor:pointer; }
  .audit-opt.active { color:#f0e6ff; font-weight:600; }
  .audit-opt.on-none.active { background:rgba(52,211,153,0.2); border-color:rgba(52,211,153,0.5); }
  .audit-opt.on-light.active { background:rgba(96,165,250,0.2); border-color:rgba(96,165,250,0.5); }
  .audit-opt.on-medium.active { background:rgba(250,204,21,0.2); border-color:rgba(250,204,21,0.5); }
  .audit-opt.on-medium_strict.active { background:rgba(251,146,60,0.2); border-color:rgba(251,146,60,0.5); }
  .audit-opt.on-strict.active { background:rgba(248,113,113,0.2); border-color:rgba(248,113,113,0.5); }
  .audit-desc { margin-top:10px; padding:12px 14px; border-radius:10px; background:rgba(255,255,255,0.03); font-size:12px; color:#a094b8; }
  .audit-desc .tip { color:#c084fc; display:block; margin-top:6px; font-size:11px; }
  .submit-btn { width:100%; margin-top:8px; background:linear-gradient(135deg,#c084fc,#f472b6); color:#fff; font-size:15px; font-weight:700; border:none; border-radius:30px; padding:13px; cursor:pointer; }
  .cancel-link { width:100%; margin-top:10px; background:transparent; color:#a094b8; font-size:13px; border:none; cursor:pointer; }

  /* 多选地点 */
  .loc-multi { display:flex; flex-wrap:wrap; gap:8px; }
  .loc-opt { padding:10px 14px; border-radius:11px; font-size:12px; color:#a094b8; background:rgba(255,255,255,0.04); border:1px solid rgba(192,132,252,0.1); cursor:pointer; }
  .loc-opt.active { background:linear-gradient(135deg, rgba(192,132,252,0.3), rgba(244,114,182,0.3)); color:#f0e6ff; border-color:rgba(192,132,252,0.45); font-weight:600; }
  .loc-negotiable { margin-top:10px; padding:10px 14px; border-radius:11px; font-size:12px; color:#facc15; background:rgba(250,204,21,0.08); border:1px solid rgba(250,204,21,0.2); cursor:pointer; display:flex; align-items:center; gap:8px; }
  .loc-negotiable.active { background:rgba(250,204,21,0.15); border-color:rgba(250,204,21,0.5); }
  .notes-hint { font-size:11px; color:#6b5e80; margin-top:6px; line-height:1.8; }
  .notes-hint b { color:#c084fc; }

  /* 详情 */
  .dt-head { background: linear-gradient(135deg,#1a0a2e,#2d1050); border:1px solid rgba(192,132,252,0.15); border-radius:16px; padding:20px; margin:12px; text-align:center; }
  .dt-head .status { display:inline-block; font-size:11px; padding:4px 14px; border-radius:30px; background:rgba(244,114,182,0.15); color:#f472b6; margin-bottom:12px; }
  .dt-head .status.done { background:rgba(52,211,153,0.15); color:#34d399; }
  .dt-head .name-big { font-size:24px; font-weight:800; color:#f0e6ff; margin:8px 0 12px; }
  .dt-head .creator { font-size:12px; color:#a094b8; }
  .audit-banner { margin:0 12px 12px; border-radius:14px; padding:14px; }
  .audit-banner b { font-size:14px; color:#f0e6ff; display:block; margin-bottom:4px; }
  .audit-banner span { font-size:12px; color:#a094b8; }
  .ban-none { background:rgba(52,211,153,0.1); border:1px solid rgba(52,211,153,0.3); }
  .ban-light { background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.3); }
  .ban-medium { background:rgba(250,204,21,0.1); border:1px solid rgba(250,204,21,0.3); }
  .ban-medium_strict { background:rgba(251,146,60,0.1); border:1px solid rgba(251,146,60,0.3); }
  .ban-strict { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); }
  .sec { background: linear-gradient(135deg,#1a0a2e,#1f1040); border:1px solid rgba(192,132,252,0.1); border-radius:14px; padding:15px; margin:0 12px 12px; }
  .sec h4 { font-size:13px; color:#c084fc; margin-bottom:10px; }
  .sec .txt { font-size:14px; color:#f0e6ff; }
  .sec .sub-txt { font-size:12px; color:#a094b8; margin-top:4px; display:block; }
  .mem { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid rgba(192,132,252,0.06); }
  .mem:last-child { border-bottom:none; }
  .mem .mav { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#6b5e80,#4a3a60); display:flex; align-items:center; justify-content:center; font-size:16px; color:#fff; margin-right:12px; cursor:pointer; }
  .mem .mav.creator { background:linear-gradient(135deg,#c084fc,#f472b6); }
  .mem .minfo { flex:1; }
  .mem .minfo .mn { font-size:14px; color:#f0e6ff; display:block; }
  .mem .minfo .mp { font-size:11px; color:#a094b8; }
  .mem .minfo .wx { font-size:11px; color:#60a5fa; cursor:pointer; }
  .mem .minfo .bio-text { font-size:11px; color:#c084fc; font-style:italic; }
  .mem .mtag { font-size:10px; padding:3px 10px; border-radius:30px; background:rgba(192,132,252,0.15); color:#c084fc; }
  .mem .gear-btn { font-size:16px; color:#a094b8; cursor:pointer; padding:4px 8px; }
  .wx-note { font-size:11px; color:#60a5fa; margin-bottom:8px; display:block; }
  .pbar { height:6px; background:rgba(192,132,252,0.1); border-radius:6px; overflow:hidden; margin:12px 0 6px; }
  .pfill { height:100%; background:linear-gradient(90deg,#c084fc,#f472b6); }
  .ptext { font-size:11px; color:#6b5e80; }

  .app-item { background:rgba(255,255,255,0.03); border:1px solid rgba(192,132,252,0.1); border-radius:12px; padding:12px; margin-bottom:10px; }
  .app-head { display:flex; align-items:center; margin-bottom:10px; }
  .app-video { display:flex; align-items:center; gap:8px; background:rgba(96,165,250,0.1); border:1px solid rgba(96,165,250,0.25); border-radius:10px; padding:10px 12px; margin-bottom:10px; cursor:pointer; }
  .app-video .vu { font-size:12px; color:#60a5fa; flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .app-msg { font-size:12px; color:#fbbf24; background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.2); border-radius:8px; padding:8px 12px; margin-bottom:10px; line-height:1.5; }
  .app-bio { font-size:11px; color:#c084fc; font-style:italic; margin-bottom:8px; }
  .app-acts { display:flex; gap:10px; }
  .app-btn { flex:1; font-size:13px; font-weight:600; border:none; border-radius:30px; padding:9px; cursor:pointer; }
  .app-btn.ok { background:linear-gradient(135deg,#34d399,#10b981); color:#fff; }
  .app-btn.no { background:transparent; border:1.5px solid #f87171; color:#f87171; }
  .app-btn.warn { background:transparent; border:1.5px solid #fbbf24; color:#fbbf24; }

  .actions { position:absolute; bottom:0; left:0; right:0; padding:14px 12px 16px; background:rgba(13,13,26,0.98); border-top:1px solid rgba(192,132,252,0.2); }
  .act-row { display:flex; gap:10px; align-items:center; }
  .join-input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(192,132,252,0.2); border-radius:30px; padding:11px 16px; font-size:13px; color:#f0e6ff; outline:none; }
  .join-input::placeholder { color:#6b5e80; }
  .join-btn { background:linear-gradient(135deg,#c084fc,#f472b6); color:#fff; font-size:14px; font-weight:700; border:none; border-radius:30px; padding:11px 20px; cursor:pointer; white-space:nowrap; }
  .apply-wrap { flex-direction:column; align-items:stretch; gap:8px; background:rgba(26,10,46,0.97); border:1px solid rgba(192,132,252,0.2); border-radius:14px; padding:14px; }
  .apply-wrap .t { font-size:13px; font-weight:700; color:#f0e6ff; }
  .apply-wrap .hint { font-size:11px; color:#c084fc; }
  .apply-wrap .join-btn { width:100%; }
  .upload-box { background:rgba(96,165,250,0.08); border:1.5px dashed rgba(96,165,250,0.4); border-radius:10px; padding:14px; text-align:center; font-size:13px; color:#60a5fa; cursor:pointer; }
  .upload-box.done { background:rgba(52,211,153,0.1); border-color:rgba(52,211,153,0.4); color:#34d399; }
  .status-wrap { flex-direction:column; gap:10px; background:rgba(26,10,46,0.97); border-radius:14px; padding:16px; text-align:center; }
  .status-wrap .pending { font-size:13px; color:#facc15; font-weight:600; }
  .status-wrap .rejected { font-size:13px; color:#f87171; font-weight:600; }
  .status-wrap .blocked { font-size:13px; color:#f87171; font-weight:600; }
  .reject-msg { font-size:12px; color:#fbbf24; background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.25); border-radius:10px; padding:10px 12px; line-height:1.6; }
  .joined-row { justify-content:center; gap:16px; }
  .joined-row .jt { font-size:14px; color:#34d399; font-weight:600; }
  .leave-btn { background:transparent; border:1.5px solid #f87171; color:#f87171; font-size:12px; border-radius:30px; padding:8px 20px; cursor:pointer; }
  .substitute-btn { background:transparent; border:1.5px solid #60a5fa; color:#60a5fa; font-size:12px; border-radius:30px; padding:8px 16px; cursor:pointer; }
  .creator-row { justify-content:center; gap:12px; flex-wrap:wrap; }
  .complete-btn { background:linear-gradient(135deg,#34d399,#10b981); color:#fff; font-size:13px; font-weight:700; border:none; border-radius:30px; padding:11px 22px; cursor:pointer; }
  .reopen-btn { background:linear-gradient(135deg,#60a5fa,#3b82f6); color:#fff; font-size:13px; font-weight:700; border:none; border-radius:30px; padding:11px 22px; cursor:pointer; }
  .cancel-btn { background:transparent; border:1.5px solid #f87171; color:#f87171; font-size:12px; border-radius:30px; padding:10px 22px; cursor:pointer; }

  .empty { text-align:center; padding:50px 20px; color:#6b5e80; }
  .empty .ei { font-size:44px; display:block; margin-bottom:12px; }

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }

function filterTeams(){
  return TEAMS.filter(t=>{
    if(t.status!=='active') return false;
    if(homeState.type && t.combo_type!==homeState.type) return false;
    if(homeState.combo && t.combo_name!==homeState.combo) return false;
    if(homeState.keyword){
      const kw=homeState.keyword.toLowerCase();
      if(!(t.song_name.toLowerCase().includes(kw) || t.combo_name.toLowerCase().includes(kw) || t.missing_positions.some(p=>p.toLowerCase().includes(kw)))) return false;
    }
    return true;
  });
}

function formatLocations(team){
  if(team.locations && team.locations.length>0){
    return team.locations.map(l=>LOC[l].name).join(' / ');
  }
  // 兼容旧数据
  if(team.location) return LOC[team.location].name;
  return '';
}

function pubSet(k,v){ pubState[k]=v; if(k==='comboType')pubState.comboName=''; renderPublish(); }
function pubInput(k,v){ pubState[k]=v; }
function pubPickCombo(c){ pubState.comboName=c; renderPublish(); }
function pubAddPos(){ const p=pubState.posInput.trim(); if(!p)return; if(pubState.positions.includes(p)){toast('该位置已添加');return;} pubState.positions.push(p); pubState.posInput=''; renderPublish(); }
function pubDelPos(i){ pubState.positions.splice(i,1); renderPublish(); }
function pubStep(d){ pubState.max=Math.max(1,Math.min(20,pubState.max+d)); renderPublish(); }
function pubToggleLoc(loc){
  const idx=pubState.locations.indexOf(loc);
  if(idx>=0) pubState.locations.splice(idx,1);
  else pubState.locations.push(loc);
  renderPublish();
}
function pubToggleNegotiable(){ pubState.locationNegotiable=!pubState.locationNegotiable; renderPublish(); }
function pubSubmit(){
  const s=pubState;
  if(!s.comboType){toast('请选择组合类型');return;}
  if(!s.comboName.trim()){toast('请输入组合名');return;}
  if(!s.songName.trim()){toast('请输入歌曲名');return;}
  if(s.positions.length===0){toast('请添加缺位信息');return;}
  if(!s.myPart.trim()){toast('请填写你跳的位置');return;}
  if(!s.rehearsal.trim()){toast('请输入排练时间');return;}
  if(!s.performance.trim()){toast('请输入路演时间');return;}
  if(s.locations.length===0){toast('请至少选择一个排练地点');return;}
  if((s.locations.includes('studio')||s.locations.includes('community'))&&!s.locationNote.trim()&&!s.locationNegotiable){toast('请填写具体位置或勾选可协商');return;}
  const nt={ id:++idCounter, combo_type:s.comboType, combo_name:s.comboName.trim(), song_name:s.songName.trim(),
    missing_positions:[...s.positions], rehearsal_time:s.rehearsal.trim(), performance_time:s.performance.trim(),
    locations:[...s.locations], location_note:s.locationNote.trim(), max_members:s.max, audit_level:s.audit, notes:s.notes.trim(),
    status:'active', creator_openid:ME, creator_nickname:ME_USER.nickname, member_count:1,
    members:[{openid:ME,part:s.myPart.trim()}], applications:[], created_at:'刚刚' };
  TEAMS.unshift(nt);
  toast('发布成功! 🎉');
  setTimeout(()=>backHome(),700);
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ═══════════ 详情页（右手机） ═══════════
let joinInputVal='', videoInputVal='', applyMode='upload', applyMessage='';
let manageMemberOpenid=null, posEditOpenid=null, bioPopupOpenid=null;

function openDetail(id){ detailId=id; joinInputVal=''; videoInputVal=''; applyMode='upload'; applyMessage=''; renderDetail(); document.getElementById('screen2').scrollTop=0; }
function closeDetail(){ detailId=null; clearPopups(); document.getElementById('screen2').innerHTML=`<div class="empty" style="padding-top:200px"><span class="ei">👈</span><span class="et">点击左侧任意组队卡片</span><span>查看详情 & 体验上车审核</span></div>`; document.getElementById('nav2').innerHTML=`<span class="back" onclick="closeDetail()">‹</span>组队详情`; }

function clearPopups(){ manageMemberOpenid=null; posEditOpenid=null; bioPopupOpenid=null; }

function renderDetail(){
  const t = TEAMS.find(x=>x.id===detailId);
  if(!t){ closeDetail(); return; }
  const isCreator = t.creator_openid===ME;
  const hasJoined = t.members.some(m=>m.openid===ME);
  const myApp = (t.applications||[]).find(a=>a.openid===ME);
  const pending = (t.applications||[]).filter(a=>a.status==='pending');
  // 需求4: 组队完成后所有成员微信可见，组队成功前只有车主微信可见
  const isCompleted = t.status==='completed';
  const contactVisible = isCompleted || isCreator;
  // 需求9: 组队完成后可见简介，组队之前看不到
  const bioVisible = isCompleted;
  const isDone = t.status==='completed';

  document.getElementById('nav2').innerHTML=`<span class="back" onclick="closeDetail()">‹</span>组队详情`;

  let html = `
    <div class="dt-head">
      <span class="status ${isDone?'done':''}">${isDone?'✅ 已完队':'🔥 组队中'}</span>
      <div><span class="combo-badge">${COMBO_TYPES[t.combo_type].emoji} ${COMBO_TYPES[t.combo_type].name} · ${t.combo_name}</span></div>
      <div class="name-big">🎤 ${t.song_name}</div>
      <div class="creator">${t.creator_nickname} 发布</div>
    </div>
    <div class="audit-banner ban-${t.audit_level}"><b>${AUDIT[t.audit_level].emoji} 上车审核：${AUDIT[t.audit_level].name}</b><span>${AUDIT[t.audit_level].desc}</span></div>
    <div class="sec"><h4>🎯 还缺什么位置</h4><div class="pos">${t.missing_positions.length?t.missing_positions.map(p=>`<span class="pos-tag">${p}</span>`).join(''):'<span style="font-size:13px;color:#34d399">✅ 已满员</span>'}</div></div>
    <div class="sec"><h4>⏰ 时间安排</h4><div class="txt">📅 排练：${t.rehearsal_time}</div><div class="txt" style="margin-top:6px">🎬 路演：${t.performance_time}</div></div>
    <div class="sec"><h4>📍 排练地点</h4><div class="txt">${formatLocations(t)}</div>${t.location_note?`<span class="sub-txt">${t.location_note}</span>`:''}</div>
    ${t.notes?`<div class="sec"><h4>📝 备注</h4><div class="txt" style="line-height:1.8">${t.notes}</div></div>`:''}
    <div class="sec"><h4>👥 已上车 (${t.member_count}/${t.max_members})</h4>
      ${contactVisible?`<span class="wx-note">💡 ${isCompleted?'组队完成，所有成员微信互相可见':'你是车主，可查看所有成员微信'}</span>`:`<span class="wx-note">🔒 组队成功后，成员微信互相可见</span>`}
      ${t.members.map(m=>{
        const u=getUser(m.openid);
        const isMemCreator = m.openid===t.creator_openid;
        return `<div class="mem">
          <div class="mav ${isMemCreator?'creator':''}" onclick="showBioPopup('${m.openid}')">${u.avatar}</div>
          <div class="minfo">
            <span class="mn">${u.nickname}</span>
            ${m.part?`<span class="mp">跳 ${m.part}</span>`:''}
            ${bioVisible&&u.bio?`<span class="bio-text">✍️ ${u.bio}</span>`:''}
            ${contactVisible?`<span class="wx" onclick="copyWx('${u.wechat}')">💬 微信：${u.wechat}</span>`:''}
          </div>
          ${isMemCreator?'<span class="mtag">车主</span>':''}
          ${isCreator && !isMemCreator && !isDone?`<span class="gear-btn" onclick="openManage('${m.openid}')">⚙️</span>`:''}
        </div>`;
      }).join('')}
      <div class="pbar"><div class="pfill" style="width:${t.member_count/t.max_members*100}%"></div></div>
      <div class="ptext">还差 ${t.max_members-t.member_count} 人满员</div>
    </div>`;

  // 车主：待审核申请（需求7: 申请人简介, 需求10: 附带留言）
  if(isCreator && pending.length){
    html += `<div class="sec" style="border-color:rgba(192,132,252,0.25)"><h4>📩 待审核申请 (${pending.length})</h4>
      <div style="font-size:11px;color:#a094b8;margin-bottom:10px">查看申请人的舞蹈视频和简介，通过后即可互看微信约排练</div>
      ${pending.map(a=>{
        const u=getUser(a.openid);
        const vtext = a.video_url && a.video_url.indexOf('[本地]')===0 ? '📹 已上传视频（仅车主可见）' : (a.video_url||'未提供视频');
        return `<div class="app-item">
          <div class="app-head">
            <div class="mav" style="width:34px;height:34px;margin-right:12px;font-size:16px">${u.avatar}</div>
            <div class="minfo">
              <span class="mn">${u.nickname}</span>
              <span class="mp">想跳：${a.part||'未填写'}</span>
              ${u.bio?`<div class="app-bio">✍️ ${u.bio}</div>`:''}
            </div>
          </div>
          ${a.message?`<div class="app-msg">💬 "${a.message}"</div>`:''}
          <div class="app-video" onclick="viewVideo('${a.video_url}')"><span>▶️</span><span class="vu">${vtext}</span></div>
          <div class="app-acts"><button class="app-btn no" onclick="renderReject('${a.openid}')">委婉拒绝</button><button class="app-btn ok" onclick="review('${a.openid}',true)">✅ 接受组队</button></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  // 找替功能区域（需求3）
  const subs = SUBSTITUTES.filter(s=>s.team_id===t.id);
  if(subs.length>0){
    html += `<div class="sub-section"><h4>🔄 找替信息</h4>`;
    subs.forEach(s=>{
      const poster = getUser(s.poster_openid);
      html += `<div class="sub-post">
        <div class="sp-head">
          <div class="mav" style="width:30px;height:30px;font-size:14px">${poster.avatar}</div>
          <div class="sp-info">
            <span class="sp-name">${poster.nickname} 找替</span>
            <span class="sp-part">跳 ${s.part}</span>
          </div>
          <span class="sp-status ${s.status==='open'?'open':'matched'}">${s.status==='open'?'寻找中':'已确认'}</span>
        </div>
        ${s.status==='open' && hasJoined && s.poster_openid!==ME?`<button class="join-btn" style="width:100%;font-size:12px;padding:9px" onclick="applySubstitute(${s.id})">🙋 我来当替身</button>`:''}
        ${s.applicants && s.applicants.length>0 && (isCreator || s.poster_openid===ME)?s.applicants.map(ap=>{
          const au=getUser(ap.openid);
          return `<div class="sub-applicant">
            <div class="mav" style="width:28px;height:28px;font-size:13px">${au.avatar}</div>
            <div class="sa-info"><span class="sa-name">${au.nickname}</span>${au.bio?`<div class="sa-bio">${au.bio}</div>`:''}</div>
            ${s.status==='open'&&(isCreator||s.poster_openid===ME)?`<button class="sa-btn confirm" onclick="confirmSubstitute(${s.id},'${ap.openid}')">确认替身</button>`:''}
          </div>`;
        }).join(''):''}
      </div>`;
    });
    html += `</div>`;
  }

  const actionTall = (!hasJoined && !isCreator && t.audit_level!=='none' && (!myApp || (myApp.status==='rejected')));
  html += `<div style="height:${actionTall?340:240}px"></div>`;

  // 操作区
  html += `<div class="actions">`;
  if(isDone){
    // 需求8: 已完成的队伍可以重新开放
    if(isCreator){
      html += `<div class="act-row creator-row">
        <span style="font-size:13px;color:#34d399">🎉 已完队</span>
        <button class="reopen-btn" onclick="doReopen()">🔄 重新开放组队</button>
      </div>`;
    } else {
      html += `<div class="act-row status-wrap"><span class="pending" style="color:#34d399">🎉 这支舞已经跳完啦，记录已留在小程序</span></div>`;
    }
  } else if(t.status==='cancelled'){
    html += `<div class="act-row status-wrap"><span class="rejected">❌ 该组队已取消</span></div>`;
  } else if(!hasJoined && !isCreator && t.audit_level==='none' && !myApp){
    html += `<div class="act-row apply-wrap" style="flex-direction:column">
      <input class="join-input" placeholder="你跳什么位置？" value="${joinInputVal}" oninput="joinInputVal=this.value">
      <input class="join-input" placeholder="给车主留句话？（选填）" value="${applyMessage}" oninput="applyMessage=this.value">
      <button class="join-btn" onclick="doJoin()">🚀 我要上车</button>
    </div>`;
  } else if(!hasJoined && !isCreator && t.audit_level!=='none' && (!myApp || (myApp.status==='rejected'))){
    // 需求11: 被拒绝两次后不能再申请
    const rejectCount = myApp ? (myApp.reject_count||0) : 0;
    if(rejectCount>=2){
      html += `<div class="act-row status-wrap">
        <span class="blocked">🚫 该组队已拒绝你 ${rejectCount} 次，无法再次申请</span>
        <span style="font-size:11px;color:#a094b8">试试其他组队吧，路演搭子很多~</span>
      </div>`;
    } else {
      html += `<div class="act-row apply-wrap">
        <span class="t">📹 申请上车（需车主审核）${rejectCount>0?` · 已被拒 ${rejectCount} 次，还剩 ${2-rejectCount} 次机会`:''}</span>
        <div class="opt-row">
          <div class="opt ${applyMode==='upload'?'active':''}" onclick="setApplyMode('upload')">📹 上传视频</div>
          <div class="opt ${applyMode==='link'?'active':''}" onclick="setApplyMode('link')">🔗 视频链接</div>
        </div>
        ${applyMode==='upload'
          ? `<div class="upload-box ${videoInputVal?'done':''}" onclick="mockUpload()">${videoInputVal?('✅ 已选择：'+videoInputVal+'（点击重选）'):'⬆️ 点击上传舞蹈视频（仅车主可见）'}</div>`
          : `<input class="join-input" placeholder="舞蹈视频链接（抖音/B站/视频号）" value="${videoInputVal}" oninput="videoInputVal=this.value">`}
        <input class="join-input" placeholder="想跳的位置？（如：karina位）" value="${joinInputVal}" oninput="joinInputVal=this.value">
        <input class="join-input" placeholder="给车主留句话？（选填）" value="${applyMessage}" oninput="applyMessage=this.value">
        <span class="hint">💡 车主看过后决定通过，视频仅车主可见</span>
        <button class="join-btn" onclick="doApply()">📩 提交申请</button>
      </div>`;
    }
  } else if(myApp && myApp.status==='pending'){
    html += `<div class="act-row status-wrap"><span class="pending">⏳ 申请已提交，等待车主审核视频...</span></div>`;
  } else if(myApp && myApp.status==='rejected'){
    const rejectCount = myApp.reject_count||1;
    if(rejectCount>=2){
      html += `<div class="act-row status-wrap">
        <span class="blocked">🚫 已被拒绝 ${rejectCount} 次，无法再次申请</span>
      </div>`;
    } else {
      html += `<div class="act-row status-wrap">
        <span class="rejected">😢 这次没通过，车主留了句话：</span>
        <div class="reject-msg">"${myApp.reject_msg||'这次坑位已满，期待下次同车～'}"</div>
        <span style="font-size:11px;color:#a094b8">还剩 ${2-rejectCount} 次申请机会</span>
        <button class="join-btn" onclick="reapply()">重新申请</button>
      </div>`;
    }
  } else if(hasJoined && !isCreator){
    html += `<div class="act-row joined-row">
      <span class="jt">✅ 你已上车</span>
      <button class="substitute-btn" onclick="postSubstitute()">🔄 找人替我</button>
      <button class="leave-btn" onclick="doLeave()">下车</button>
    </div>`;
  } else if(isCreator){
    html += `<div class="act-row creator-row">${t.member_count>=2?'<button class="complete-btn" onclick="doComplete()">✅ 组队完成</button>':''}<button class="cancel-btn" onclick="doCancel()">❌ 取消组队</button></div>`;
  }
  html += `</div>`;

  // 成员管理弹窗（需求5）
  if(manageMemberOpenid){
    const m = t.members.find(x=>x.openid===manageMemberOpenid);
    if(m){
      html += `<div class="overlay" onclick="closeManage()"></div>`;
      html += `<div class="manage-popup">
        <div class="mp-title">管理成员 - ${getUser(m.openid).nickname}</div>
        <div class="mp-item" onclick="openPosEdit('${m.openid}')">
          <span class="mp-ico">✏️</span>
          <div><div class="mp-text">修改成员位置</div><div class="mp-desc">当前：${m.part||'未填写'}</div></div>
        </div>
        <div class="mp-item" onclick="removeMember('${m.openid}')">
          <span class="mp-ico">🗑️</span>
          <div><div class="mp-text">移除该成员</div><div class="mp-desc">移除后该位置回到缺位列表</div></div>
        </div>
        <div class="mp-close" onclick="closeManage()">取消</div>
      </div>`;
    }
  }

  // 修改位置弹窗（需求5）
  if(posEditOpenid){
    const m = t.members.find(x=>x.openid===posEditOpenid);
    if(m){
      html += `<div class="overlay" onclick="closePosEdit()"></div>`;
      html += `<div class="pos-edit-popup">
        <div class="pe-title">修改 ${getUser(m.openid).nickname} 的位置</div>
        <input id="posEditInput" placeholder="如：karina位" value="${m.part||''}">
        <div class="pe-btns">
          <button class="pe-cancel" onclick="closePosEdit()">取消</button>
          <button class="pe-save" onclick="savePosEdit()">保存</button>
        </div>
      </div>`;
    }
  }

  // bio弹窗（需求9）
  if(bioPopupOpenid){
    const u = getUser(bioPopupOpenid);
    const isMem = t.members.some(m=>m.openid===bioPopupOpenid);
    if(isMem){
      const canSeeBio = bioVisible || bioPopupOpenid===ME || bioPopupOpenid===t.creator_openid;
      html += `<div class="overlay" onclick="closeBioPopup()"></div>`;
      html += `<div class="bio-popup">
        <div class="bp-av">${u.avatar}</div>
        <div class="bp-name">${u.nickname}</div>
        ${canSeeBio?(u.bio?`<div class="bp-bio">"${u.bio}"</div>`:'<div class="bp-bio" style="color:#6b5e80">暂无简介</div>'):'<div class="bp-bio" style="color:#6b5e80">🔒 组队完成后可见简介</div>'}
        ${contactVisible?`<div style="font-size:12px;color:#60a5fa;margin-bottom:16px">💬 微信：${u.wechat}</div>`:''}
        <button class="bp-close" onclick="closeBioPopup()">关闭</button>
      </div>`;
    }
  }

  document.getElementById('screen2').innerHTML = html;
}

// 成员管理相关（需求5）
function openManage(openid){ manageMemberOpenid=openid; renderDetail(); }
function closeManage(){ manageMemberOpenid=null; renderDetail(); }
function openPosEdit(openid){ posEditOpenid=openid; manageMemberOpenid=null; renderDetail(); setTimeout(()=>{const inp=document.getElementById('posEditInput');if(inp)inp.focus();},50); }
function closePosEdit(){ posEditOpenid=null; renderDetail(); }
function savePosEdit(){
  const t=TEAMS.find(x=>x.id===detailId);
  const m=t.members.find(x=>x.openid===posEditOpenid);
  if(!m)return;
  const val=(document.getElementById('posEditInput').value||'').trim();
  m.part=val||'未填写';
  toast('位置已更新');
  posEditOpenid=null;
  renderDetail();
}
function removeMember(openid){
  const t=TEAMS.find(x=>x.id===detailId);
  const m=t.members.find(x=>x.openid===openid);
  if(!m)return;
  // 移除后该位置回到缺位列表
  if(m.part) t.missing_positions.push(m.part);
  t.members=t.members.filter(x=>x.openid!==openid);
  t.member_count=t.members.length;
  t.applications=(t.applications||[]).filter(a=>a.openid!==openid);
  toast('已移除成员，位置已回到缺位列表');
  manageMemberOpenid=null;
  renderDetail();
  refreshLeft();
}

// bio弹窗（需求9）
function showBioPopup(openid){ bioPopupOpenid=openid; renderDetail(); }
function closeBioPopup(){ bioPopupOpenid=null; renderDetail(); }

// 找替功能（需求3）
function postSubstitute(){
  const t=TEAMS.find(x=>x.id===detailId);
  const myMember = t.members.find(m=>m.openid===ME);
  if(!myMember){toast('你不在该队伍中');return;}
  // 检查是否已有找替
  const exist = SUBSTITUTES.find(s=>s.team_id===t.id && s.poster_openid===ME && s.status==='open');
  if(exist){toast('你已发布过找替信息');return;}
  const sub={ id:++subIdCounter, team_id:t.id, poster_openid:ME, poster_name:ME_USER.nickname, part:myMember.part, status:'open', applicants:[] };
  SUBSTITUTES.push(sub);
  toast('找替信息已发布 🔄');
  renderDetail();
}
function applySubstitute(subId){
  const sub=SUBSTITUTES.find(s=>s.id===subId);
  if(!sub)return;
  if(sub.applicants.some(a=>a.openid===ME)){toast('你已经申请过了');return;}
  sub.applicants.push({openid:ME,nickname:ME_USER.nickname});
  toast('已申请当替身 🙋');
  renderDetail();
}
function confirmSubstitute(subId,applicantOpenid){
  const sub=SUBSTITUTES.find(s=>s.id===subId);
  if(!sub)return;
  const t=TEAMS.find(x=>x.id===detailId);
  if(!t)return;
  // 替身替换原成员
  const oldMember = t.members.find(m=>m.openid===sub.poster_openid);
  if(oldMember){
    // 移除原成员
    t.members = t.members.filter(m=>m.openid!==sub.poster_openid);
    // 添加替身
    t.members.push({openid:applicantOpenid, part:sub.part});
    t.member_count = t.members.length;
  }
  sub.status='matched';
  const ap = sub.applicants.find(a=>a.openid===applicantOpenid);
  if(ap) ap.confirmed=true;
  toast('替身已确认！✅');
  renderDetail();
  refreshLeft();
}

// 重新开放组队（需求8）
function doReopen(){
  const t=TEAMS.find(x=>x.id===detailId);
  t.status='active';
  toast('组队已重新开放 🔄');
  renderDetail();
  refreshLeft();
}

function setApplyMode(m){ applyMode=m; if(m==='upload'&&!videoInputVal) videoInputVal=''; renderDetail(); }
function mockUpload(){ videoInputVal='dance_'+Math.floor(100000+Math.random()*900000)+'.mp4'; renderDetail(); }
function viewVideo(url){ if(!url){toast('未提供视频');return;} if(url.indexOf('[本地]')===0){ toast('车主可查看你上传的视频'); } else { toast('📋 链接已复制：'+url); } }

function doJoin(){
  const t=TEAMS.find(x=>x.id===detailId);
  if(!joinInputVal.trim()){toast('请填写你想跳的位置');return;}
  if(t.members.length>=t.max_members){toast('人数已满');return;}
  t.members.push({openid:ME,part:joinInputVal.trim()});
  t.member_count=t.members.length;
  if(t.audit_level==='none' && joinInputVal.trim() && t.missing_positions.includes(joinInputVal.trim())){
    t.missing_positions=t.missing_positions.filter(p=>p!==joinInputVal.trim());
  }
  toast('上车成功! 🚀');
  joinInputVal=''; applyMessage='';
  renderDetail();
  refreshLeft();
}

function doApply(){
  const t=TEAMS.find(x=>x.id===detailId);
  if(!joinInputVal.trim()){toast('请填写你想跳的位置');return;}
  if(!videoInputVal.trim()){toast(applyMode==='upload'?'请先上传舞蹈视频':'请填写舞蹈视频链接');return;}
  const v = applyMode==='upload' ? '[本地]'+videoInputVal : videoInputVal.trim();
  t.applications=t.applications.filter(a=>a.openid!==ME);
  t.applications.push({openid:ME,nickname:ME_USER.nickname,part:joinInputVal.trim(),video_url:v,status:'pending',message:applyMessage.trim(),reject_count:0});
  toast('申请已提交 📩 等车主审核');
  joinInputVal=''; videoInputVal=''; applyMessage='';
  renderDetail();
}

function reapply(){
  const t=TEAMS.find(x=>x.id===detailId);
  const myApp = t.applications.find(a=>a.openid===ME);
  // 保留 reject_count
  const rc = myApp ? (myApp.reject_count||0) : 0;
  t.applications=t.applications.filter(a=>a.openid!==ME);
  applyMode='upload'; videoInputVal=''; applyMessage='';
  renderDetail();
}

function review(openid,approve){
  const t=TEAMS.find(x=>x.id===detailId);
  const a=t.applications.find(x=>x.openid===openid);
  if(!a)return;
  if(approve){
    if(t.members.length>=t.max_members){toast('人数已满，无法通过');return;}
    a.status='approved';
    t.members.push({openid:a.openid,part:a.part});
    t.member_count=t.members.length;
    if(a.part && t.missing_positions.includes(a.part)){ t.missing_positions=t.missing_positions.filter(p=>p!==a.part); }
    toast('已接受组队，对方上车成功! ✅ 双方已可互看微信');
    renderDetail();
    refreshLeft();
  }
}

function doLeave(){
  const t=TEAMS.find(x=>x.id===detailId);
  const myMember=t.members.find(m=>m.openid===ME);
  if(myMember && myMember.part) t.missing_positions.push(myMember.part);
  t.members=t.members.filter(m=>m.openid!==ME);
  t.applications=(t.applications||[]).filter(a=>a.openid!==ME);
  t.member_count=t.members.length;
  // 清理找替
  SUBSTITUTES=SUBSTITUTES.filter(s=>!(s.team_id===t.id && s.poster_openid===ME));
  toast('已下车');
  renderDetail();
  refreshLeft();
}

function doComplete(){
  const t=TEAMS.find(x=>x.id===detailId);
  t.status='completed';
  toast('组队完成! 🎉 记录已留存');
  closeDetail();
  refreshLeft();
}

function doCancel(){
  const t=TEAMS.find(x=>x.id===detailId);
  t.status='cancelled';
  toast('组队已取消');
  closeDetail();
  refreshLeft();
}

function refreshLeft(){
  if(leftView==='home'||currentTab==='home') renderHome();
  else if(leftView==='mine') renderMine();
  else if(leftView==='feedback') renderFeedback();
  else if(leftView==='profileEdit') renderProfileEdit();
}

// ═══════════ 委婉拒绝（需求11: reject_count计数） ═══════════
let rejectOpenid=null, rejectPick='full', rejectCustom='';
function renderReject(openid){
  rejectOpenid=openid;
  const t=TEAMS.find(x=>x.id===detailId);
  const a=t.applications.find(x=>x.openid===openid);
  const u=getUser(openid);
  document.getElementById('nav2').innerHTML=`<span class="back" onclick="renderDetail()">‹</span>委婉拒绝`;
  document.getElementById('screen2').innerHTML=`
    <div class="form"><div class="fcard">
      <h3>💌 委婉拒绝 ${u.nickname}</h3>
      <div class="sub">选一个理由，或自己写一句友好提示发给 TA～</div>
      ${REJECT_PRESETS.map(p=>`<div class="reject-item ${rejectPick===p.key?'active':''}" onclick="rejectPick='${p.key}';rejectCustom='';renderReject('${openid}')">
        <div class="ri-radio">${rejectPick===p.key?'●':'○'}</div>
        <div class="ri-text"><b>${p.label}</b><br>${p.msg}</div>
      </div>`).join('')}
      <div class="reject-item ${rejectPick==='custom'?'active':''}" onclick="rejectPick='custom';renderReject('${openid}')">
        <div class="ri-radio">${rejectPick==='custom'?'●':'○'}</div>
        <div class="ri-text"><b>自己写理由</b><br><span style="font-size:11px;color:#a094b8">想说什么就写什么，都会以友好口吻发出</span></div>
      </div>
      ${rejectPick==='custom'?`<textarea id="rejectCustom" placeholder="如：这次编舞风格不太适合你，但你跳得很好，下次有合适坑位一定找你～" oninput="rejectCustom=this.value" style="width:100%;min-height:80px;background:rgba(255,255,255,0.04);border:1px solid rgba(192,132,252,0.15);border-radius:10px;padding:11px 14px;font-size:13px;color:#f0e6ff;outline:none;font-family:inherit;margin-top:8px">${rejectCustom}</textarea>`:''}
      <button class="submit-btn" onclick="confirmReject()">发送友好拒绝</button>
      <button class="cancel-link" onclick="renderDetail()">返回</button>
    </div></div>`;
}

function confirmReject(){
  const t=TEAMS.find(x=>x.id===detailId);
  const a=t.applications.find(x=>x.openid===rejectOpenid);
  if(!a)return;
  let msg;
  if(rejectPick==='custom'){
    msg=(rejectCustom||'').trim();
    if(!msg){ toast('请填写你的拒绝理由'); return; }
  } else {
    const p=REJECT_PRESETS.find(x=>x.key===rejectPick);
    msg=p?p.msg:REJECT_PRESETS[0].msg;
  }
  a.status='rejected';
  a.reject_msg=msg;
  // 需求11: 增加拒绝计数
  a.reject_count=(a.reject_count||0)+1;
  toast(`已委婉拒绝 💌 该申请人已被拒 ${a.reject_count} 次（2次后将无法再申请）`);
  renderDetail();
  refreshLeft();
}

// 初始化
renderHome();
closeDetail();
</script>
